<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body>

    <h2>Registration Form</h2>

    <form action="/submit" method="post">

        <!-- Name -->
        <label>Full Name:</label><br>
        <input type="text" name="fullname" placeholder="Enter your name" required><br><br>

        <!-- Email -->
        <label>Email:</label><br>
        <input type="email" name="email" placeholder="Enter your email" required><br><br>

        <!-- Password -->
        <label>Password:</label><br>
        <input type="password" name="password" placeholder="Enter password" required><br><br>

        <!-- Confirm Password -->
        <label>Confirm Password:</label><br>
        <input type="password" name="confirm_password" placeholder="Confirm password" required><br><br>

        <!-- Gender -->
        <label>Gender:</label><br>
        <input type="radio" name="gender" value="male"> Male
        <input type="radio" name="gender" value="female"> Female<br><br>

        <!-- Date of Birth -->
        <label>Date of Birth:</label><br>
        <input type="date" name="dob"><br><br>

        <!-- Phone -->
        <label>Phone Number:</label><br>
        <input type="tel" name="phone" placeholder="Enter phone number"><br><br>

        <!-- Address -->
        <label>Address:</label><br>
        <textarea name="address" placeholder="Enter your address"></textarea><br><br>

        <!-- Submit Button -->
        <input type="submit" value="Register">

    </form>

</body>
</html>
